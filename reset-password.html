<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obnovení hesla | HR Nábor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
      <div class="flex items-center gap-3 mb-8">
        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-bold p-2.5 rounded-xl text-sm shadow-md">HR</div>
        <h1 class="text-xl font-bold text-slate-900">Nábor</h1>
      </div>
      <!-- Krok 1: zadat e-mail -->
      <div id="step-request">
        <h2 class="text-lg font-semibold text-slate-800 mb-6">Zapomněli jste heslo?</h2>
        <p class="text-sm text-slate-500 mb-4">Zadejte e-mail účtu a zašleme vám odkaz pro obnovení hesla.</p>
        <form id="request-form" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
            <input type="email" id="email" name="email" required autocomplete="email"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
              placeholder="vas@email.cz">
          </div>
          <p id="request-error" class="text-sm text-red-600 hidden"></p>
          <p id="request-success" class="text-sm text-emerald-600 hidden"></p>
          <button type="submit" id="btn-request"
            class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-semibold py-2.5 rounded-xl shadow-md transition-all">
            Odeslat odkaz
          </button>
        </form>
      </div>
      <!-- Krok 2: nové heslo (když je token v URL) -->
      <div id="step-reset" class="hidden">
        <h2 class="text-lg font-semibold text-slate-800 mb-6">Nové heslo</h2>
        <form id="reset-form" class="space-y-5">
          <div>
            <label for="reset-password" class="block text-sm font-medium text-slate-700 mb-1.5">Heslo (min. 8 znaků)</label>
            <input type="password" id="reset-password" name="password" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
              placeholder="••••••••">
          </div>
          <div>
            <label for="reset-password2" class="block text-sm font-medium text-slate-700 mb-1.5">Heslo znovu</label>
            <input type="password" id="reset-password2" name="password2" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
              placeholder="••••••••">
          </div>
          <p id="reset-error" class="text-sm text-red-600 hidden"></p>
          <button type="submit" id="btn-reset"
            class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-semibold py-2.5 rounded-xl shadow-md transition-all">
            Nastavit nové heslo
          </button>
        </form>
      </div>
      <p class="mt-6 text-center">
        <a href="login.html" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">Zpět na přihlášení</a>
      </p>
    </div>
  </div>
  <script src="config.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const stepRequest = document.getElementById('step-request');
      const stepReset = document.getElementById('step-reset');
      if (token) {
        stepRequest.classList.add('hidden');
        stepReset.classList.remove('hidden');
      }
      function showError(elId, msg) {
        const el = document.getElementById(elId);
        if (el) {
          el.textContent = msg || '';
          el.classList.toggle('hidden', !msg);
        }
      }
      function showSuccess(elId, msg) {
        const el = document.getElementById(elId);
        if (el) {
          el.textContent = msg || '';
          el.classList.toggle('hidden', !msg);
        }
      }
      document.getElementById('request-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('request-error', '');
        showSuccess('request-success', '');
        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('btn-request');
        btn.disabled = true;
        try {
          const res = await fetch(window.API_BASE + '/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await res.json().catch(() => ({}));
          showSuccess('request-success', data.message || 'Pokud účet existuje, zašleme vám e-mail s odkazem.');
        } catch (err) {
          showError('request-error', 'Chyba připojení k serveru.');
        }
        btn.disabled = false;
      });
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('reset-error', '');
        const password = document.getElementById('reset-password').value;
        const password2 = document.getElementById('reset-password2').value;
        if (password.length < 8) {
          showError('reset-error', 'Heslo musí mít alespoň 8 znaků.');
          return;
        }
        if (password !== password2) {
          showError('reset-error', 'Hesla se neshodují.');
          return;
        }
        const btn = document.getElementById('btn-reset');
        btn.disabled = true;
        try {
          const res = await fetch(window.API_BASE + '/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError('reset-error', data.error || 'Obnovení hesla se nezdařilo.');
            btn.disabled = false;
            return;
          }
          if (data.sessionToken) {
            localStorage.setItem('sessionToken', data.sessionToken);
            localStorage.setItem('user', JSON.stringify(data.user));
          }
          window.location.href = 'index.html';
        } catch (err) {
          showError('reset-error', 'Chyba připojení k serveru.');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
