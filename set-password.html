<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nastavení hesla | HR Nábor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
      <div class="flex items-center gap-3 mb-8">
        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-bold p-2.5 rounded-xl text-sm shadow-md">HR</div>
        <h1 class="text-xl font-bold text-slate-900">Nábor</h1>
      </div>
      <div id="invalid-token" class="hidden text-red-600 text-sm mb-4">Odkaz není platný nebo vypršel.</div>
      <div id="form-wrap">
        <h2 class="text-lg font-semibold text-slate-800 mb-1" id="form-title">Nastavení hesla</h2>
        <p class="text-sm text-slate-500 mb-6">Účet: <span id="invite-email" class="font-medium text-slate-700"></span></p>
        <form id="set-password-form" class="space-y-5">
          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Heslo (min. 8 znaků)</label>
            <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
              placeholder="••••••••">
          </div>
          <div>
            <label for="password2" class="block text-sm font-medium text-slate-700 mb-1.5">Heslo znovu</label>
            <input type="password" id="password2" name="password2" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
              placeholder="••••••••">
          </div>
          <p id="form-error" class="text-sm text-red-600 hidden"></p>
          <button type="submit" id="btn-submit"
            class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-semibold py-2.5 rounded-xl shadow-md transition-all">
            Nastavit heslo a přihlásit se
          </button>
        </form>
      </div>
    </div>
  </div>
  <script src="config.js?env=1"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const invalidEl = document.getElementById('invalid-token');
      const formWrap = document.getElementById('form-wrap');
      const form = document.getElementById('set-password-form');
      const errEl = document.getElementById('form-error');
      const btn = document.getElementById('btn-submit');
      function showError(msg) {
        errEl.textContent = msg || '';
        errEl.classList.toggle('hidden', !msg);
      }
      async function init() {
        if (!token) {
          invalidEl.classList.remove('hidden');
          formWrap.classList.add('hidden');
          return;
        }
        try {
          const res = await fetch(window.API_BASE + '/api/invitations/validate?token=' + encodeURIComponent(token));
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            invalidEl.classList.remove('hidden');
            formWrap.classList.add('hidden');
            return;
          }
          document.getElementById('invite-email').textContent = data.email || '';
          const titleEl = document.getElementById('form-title');
          if (titleEl) titleEl.textContent = (data.type === 'reset') ? 'Nastavení nového hesla' : 'Registrace a nastavení hesla';
        } catch (e) {
          invalidEl.classList.remove('hidden');
          formWrap.classList.add('hidden');
        }
      }
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('');
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        if (password.length < 8) {
          showError('Heslo musí mít alespoň 8 znaků.');
          return;
        }
        if (password !== password2) {
          showError('Hesla se neshodují.');
          return;
        }
        btn.disabled = true;
        try {
          const res = await fetch(window.API_BASE + '/api/auth/set-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError(data.error || 'Nastavení hesla se nezdařilo.');
            btn.disabled = false;
            return;
          }
          if (data.sessionToken) {
            localStorage.setItem('sessionToken', data.sessionToken);
            localStorage.setItem('user', JSON.stringify(data.user));
          }
          window.location.href = 'index.html';
        } catch (err) {
          showError('Chyba připojení k serveru.');
          btn.disabled = false;
        }
      });
      init();
    })();
  </script>
</body>
</html>
